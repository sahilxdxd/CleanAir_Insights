<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup • CleanAir Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar soft-nav">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="/">
                <span class="brand-mark">AQ</span>
                <span class="fw-bold">CleanAir Insights</span>
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-ghost-modern btn-sm">Home</a>
                <a href="/login" class="btn btn-primary-modern btn-sm">Login</a>
            </div>
        </div>
    </nav>

    <main class="page-shell auth-layout">
        <section class="surface-card auth-card">
            <span class="page-kicker"><i class="bi bi-person-plus"></i> Create account</span>
            <h1 class="section-title h2 mt-3 mb-2">Signup</h1>
            <p class="helper-text">Set up a clean, personal account to save AQI history and revisit previous checks.</p>

            <div id="msg" class="alert alert-danger d-none" role="alert"></div>

            <form id="form" class="mt-3">
                <div class="mb-3">
                    <label class="input-label" for="name">Name</label>
                    <input id="name" type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="input-label" for="email">Email</label>
                    <input id="email" type="email" name="email" class="form-control" placeholder="Enter your email address" required>
                </div>
                <div class="mb-3">
                    <label class="input-label" for="password">Password</label>
                    <input id="password" type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-modern btn-primary-modern" type="submit">
                        <i class="bi bi-check2-circle me-2"></i>Create account
                    </button>
                </div>
            </form>

            <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
                <a href="/" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back home</a>
                <a href="/login" class="back-link">Already have an account</a>
            </div>

            <p class="helper-text mt-3 mb-0">Your account details are stored securely after hashing.</p>
        </section>
    </main>

    <script>
        const form = document.getElementById("form");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.classList.add("d-none");

            const payload = Object.fromEntries(new FormData(form));

            const res = await fetch("/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect;
                return;
            }

            msg.textContent = data.message || "Signup failed.";
            msg.classList.remove("d-none");
        });
    </script>
</body>
</html>
