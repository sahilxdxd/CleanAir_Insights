<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • CleanAir Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar soft-nav">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="/">
                <span class="brand-mark">AQ</span>
                <span class="fw-bold">CleanAir Insights</span>
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-ghost-modern btn-sm">Home</a>
                <a href="/signup" class="btn btn-primary-modern btn-sm">Get Started</a>
            </div>
        </div>
    </nav>

    <main class="page-shell auth-layout">
        <section class="surface-card auth-card">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <div>
                    <span class="page-kicker"><i class="bi bi-person-check"></i> Welcome back</span>
                    <h1 class="section-title h2 mt-3 mb-2">Login</h1>
                    <p class="helper-text mb-0">Access your dashboard or open the secure admin panel.</p>
                </div>
                <div class="auth-tabs" role="tablist" aria-label="Login type">
                    <button type="button" class="auth-tab active" id="userTab">User</button>
                    <button type="button" class="auth-tab" id="adminTab">Admin</button>
                </div>
            </div>

            <div id="msg" class="alert alert-danger d-none" role="alert"></div>

            <form id="form" class="mt-2">
                <input type="hidden" name="role" id="roleInput" value="user">

                <div class="mb-3">
                    <label class="input-label" for="email">Email</label>
                    <input id="email" type="email" name="email" class="form-control" placeholder="Enter your email address" required>
                </div>

                <div class="mb-3">
                    <label class="input-label" for="password">Password</label>
                    <input id="password" type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-modern btn-primary-modern" type="submit">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Continue
                    </button>
                </div>
            </form>

            <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
                <a href="/" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back home</a>
                <a href="/signup" class="back-link">Create account</a>
                <a href="/admin-login" class="back-link">Admin access</a>
            </div>

            <p class="helper-text mt-3 mb-0">
                User login opens the dashboard. Admin login opens the management panel.
            </p>
        </section>
    </main>

    <script>
        const form = document.getElementById("form");
        const msg = document.getElementById("msg");
        const roleInput = document.getElementById("roleInput");
        const userTab = document.getElementById("userTab");
        const adminTab = document.getElementById("adminTab");

        function setRole(role) {
            roleInput.value = role;
            const isAdmin = role === "admin";
            userTab.classList.toggle("active", !isAdmin);
            adminTab.classList.toggle("active", isAdmin);
        }

        userTab.addEventListener("click", () => setRole("user"));
        adminTab.addEventListener("click", () => setRole("admin"));

        const params = new URLSearchParams(window.location.search);
        if (params.get("role") === "admin") {
            setRole("admin");
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.classList.add("d-none");

            const payload = Object.fromEntries(new FormData(form));

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect;
                return;
            }

            msg.textContent = data.message || "Login failed.";
            msg.classList.remove("d-none");
        });
    </script>
</body>
</html>
